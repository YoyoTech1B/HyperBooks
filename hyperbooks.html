<!DOCTYPE html>
<html>
<head>
  <title>Hyperbooks</title>

  <style>
    body{
      font-family:Arial;
      background:#f5f5f5;
      padding:40px;
    }

    .box{
      background:white;
      max-width:700px;
      margin:auto;
      padding:30px;
      border-radius:20px;
    }

    h1{
      text-align:center;
      color:purple;
    }

    label{
      display:block;
      margin-top:20px;
      font-weight:bold;
    }

    input,
    select,
    textarea{
      width:100%;
      padding:12px;
      margin-top:5px;
      border-radius:10px;
      border:1px solid #ccc;
    }

    button{
      margin-top:30px;
      width:100%;
      padding:15px;
      background:purple;
      color:white;
      border:none;
      border-radius:10px;
      font-size:18px;
      cursor:pointer;
    }

    #customBox{
      display:none;
    }
  </style>
</head>

<body>

<div class="box">

<h1>Hyperbooks</h1>

<label>Choose a Book</label>

<select id="book">
  <option>Diary</option>
  <option>Maze Book</option>
  <option>Notebook</option>
  <option>Colouring Book</option>
  <option>Drawing Book</option>
  <option>Workbook</option>
  <option>Memory Book</option>
  <option>Picture Book</option>
  <option>Chore Book</option>
  <option>Custom Book</option>
</select>

<label>Colour</label>
<input type="text">

<label>Boy or Girl</label>
<select>
  <option>Boy</option>
  <option>Girl</option>
</select>

<label>Pages (Max 20)</label>
<input type="number" max="20">

<div id="customBox">
  <label>What do you want in your custom book?</label>
  <textarea></textarea>
</div>

<button onclick="price()">See Price</button>

<h2 id="total"></h2>

</div>

<script>
const book = document.getElementById("book");
const customBox = document.getElementById("customBox");

book.addEventListener("change", function(){

  if(book.value === "Custom Book"){
    customBox.style.display = "block";
  }
  else{
    customBox.style.display = "none";
  }

});

function price(){

  let total = 30;

  if(book.value === "Custom Book"){
    total = 50;
  }

  document.getElementById("total").innerHTML =
  "Price: $" + total;
}
</script>

</body>
</html>
